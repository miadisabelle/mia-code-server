name: "mcode-server"
arch: "${NFPM_ARCH}"
platform: "linux"
version: "v${VERSION}"
section: "devel"
priority: "optional"
maintainer: "JG Will <jgwill@users.noreply.github.com>"
description: |
  Run VS Code in the browser.
vendor: "miadisabelle"
homepage: "https://github.com/miadisabelle/mia-code-server"
license: "MIT"

contents:
  - src: ./ci/build/mcode-server-nfpm.sh
    dst: /usr/bin/mcode-server

  - src: ./ci/build/mcode-server@.service
    dst: /usr/lib/systemd/system/mcode-server@.service

  - src: ./ci/build/mcode-server-user.service
    dst: /usr/lib/systemd/user/mcode-server.service

  - src: ./release-standalone/*
    dst: /usr/lib/mcode-server
